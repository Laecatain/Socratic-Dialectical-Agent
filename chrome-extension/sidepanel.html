<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>苏格拉底辩证助手</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #e94560;
      --accent2: #667eea;
      --text: #e0e0e0;
      --text-dim: #888;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }
    .header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .badge {
      font-size: 11px;
      background: var(--accent2);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: auto;
    }
    .source-card {
      padding: 14px 20px;
      background: var(--card);
      margin: 12px 16px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .source-card .label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .source-card .source-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      max-height: 100px;
      overflow-y: auto;
      word-break: break-word;
    }
    .source-card .source-url {
      font-size: 11px;
      color: var(--accent2);
      margin-top: 6px;
      opacity: 0.7;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-area {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .status-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 13px;
      padding: 8px 0;
    }
    .status-msg .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .question-card {
      padding: 16px 18px;
      background: linear-gradient(135deg, #1e1e3f, #1a1a35);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }
    .question-card .q-label {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .question-card .q-text {
      font-size: 15px;
      line-height: 1.7;
      color: #fff;
      word-break: break-word;
    }
    .question-card .q-text .cursor {
      display: inline-block;
      width: 2px;
      height: 17px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .question-card .q-text .cursor.done {
      display: none;
    }
    .debug-card {
      padding: 10px 14px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .debug-card span {
      color: var(--accent2);
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 13px;
      max-width: 240px;
      line-height: 1.6;
    }
    .error-card {
      padding: 14px 18px;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 10px;
      color: var(--accent);
      font-size: 13px;
    }
    .footer {
      padding: 10px 20px;
      background: var(--card);
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏛️ 苏格拉底辩证助手</h1>
    <span class="badge" id="statusBadge">就绪</span>
  </div>

  <div id="mainContent" class="empty-state">
    <div class="icon">📜</div>
    <p>在任意网页<strong>划词选中文本</strong>，右键点击「苏格拉底模式质询」，AI 将逐字提问。</p>
  </div>

  <div class="footer">
    后端: <span id="backendStatus">检测中...</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
